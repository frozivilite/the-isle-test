<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디 아일 성향 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }
    h1, h2, h3 { margin-bottom: 12px; }
    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }
    .choice {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
    }
    .muted { color: #666; }
    .hidden { display: none; }
    .result-item {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px;
      margin: 12px 0;
    }
    .tag {
      display: inline-block;
      border: 1px solid #bbb;
      border-radius: 999px;
      padding: 2px 8px;
      margin: 4px 6px 0 0;
      font-size: 13px;
    }
    .small { font-size: 14px; }
    .progress { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>디 아일 성향 테스트</h1>
  <p class="muted">기본형 버전이야. 선택지를 누르면서 진행하면 마지막에 1, 2, 3등 추천이 나와.</p>

  <div id="start-screen" class="card">
    <h2>시작</h2>
    <p>식성에 따라 질문 수가 달라져. 육식은 추가 질문이 나올 수 있어.</p>
    <button id="start-btn" class="choice">검사 시작</button>
  </div>

  <div id="quiz-screen" class="card hidden">
    <div id="progress" class="progress"></div>
    <h2 id="question-title"></h2>
    <div id="choices"></div>
  </div>

  <div id="result-screen" class="card hidden">
    <h2>검사 결과</h2>
    <div id="result-list"></div>
    <button id="restart-btn" class="choice">다시 하기</button>
  </div>

    const questions = [

        carnivoreOnly: true,
        tieBreaker: true,
        choices: [
          { text: "한 구역에 머물며, 안전한 거점 근처에서 각을 오래 보는 편이 좋다", mode: "camp" },
          { text: "여기저기 돌아다니며 기회가 보이면 바로 물고 늘어지는 편이 좋다", mode: "wide" }
        ]
      }
    ];

    const state = {
      currentIndex: 0,
      answers: {},
      scores: {}
    };

    function resetScores() {
      state.scores = {};
      species.forEach(s => state.scores[s.name] = 0);
    }

    function scoreByValue(field, value, weight) {
      species.forEach(s => {
        const target = s[field];
        if (Array.isArray(target)) {
          if (target.includes(value)) state.scores[s.name] += weight;
        } else {
          if (target === value) state.scores[s.name] += weight;
        }
      });
    }

    function scoreByTags(tags, weight) {
      species.forEach(s => {
        let gained = 0;
        tags.forEach(tag => {
          if (s.styles.includes(tag)) gained += weight;
        });
        state.scores[s.name] += gained;
      });
    }

    function applyDiet(choice) {
      species.forEach(s => {
        state.scores[s.name] += choice.apply(s);
      });
    }

    function shouldAskTieBreaker() {
      if (state.answers.diet !== "carnivore") return false;
      const ranked = getRankedSpecies();
      const topCarnivores = ranked.filter(r => getSpecies(r.name).diet === "carnivore").slice(0, 3).map(r => r.name);
      const set = new Set(topCarnivores);
      return set.has("옴니랍토르") || set.has("데이노수쿠스") || set.has("트로오돈");
    }

    function applyTieBreaker(mode) {
      if (mode === "camp") {
        addScore("트로오돈", 2); // future-proof if later added
        addScore("데이노수쿠스", 2);
      }
      if (mode === "wide") {
        addScore("옴니랍토르", 2);
        addScore("딜로포사우루스", 1);
        addScore("헤레라사우루스", 1);
      }
    }

    function addScore(name, amount) {
      if (state.scores[name] !== undefined) state.scores[name] += amount;
    }

    function getSpecies(name) {
      return species.find(s => s.name === name);
    }

    function getVisibleQuestions() {
      return questions.filter(q => {
        if (q.carnivoreOnly && state.answers.diet !== "carnivore") return false;
        if (q.herbivoreOnly && state.answers.diet !== "herbivore") return false;
        if (q.omnivoreOnly && state.answers.diet !== "omnivore") return false;
        if (q.tieBreaker && !shouldAskTieBreaker()) return false;
        return true;
        });
      }

    function renderQuestion() {
      const visibleQuestions = getVisibleQuestions();
      const question = visibleQuestions[state.currentIndex];
      const total = visibleQuestions.length;

      if (!question) {
        showResults();
        return;
      }

      document.getElementById("progress").textContent = `${state.currentIndex + 1} / ${total}`;
      document.getElementById("question-title").textContent = question.title;
      const choicesEl = document.getElementById("choices");
      choicesEl.innerHTML = "";

      question.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choice.text;
        btn.onclick = () => handleChoice(question, choice);
        choicesEl.appendChild(btn);
      });
    }

    function handleChoice(question, choice) {
      if (question.id === "diet") {
        state.answers.diet = choice.text === "초식" ? "herbivore" : choice.text === "육식" ? "carnivore" : "omnivore";
        applyDiet(choice);
      } else if (question.id === "fun") {
        scoreByTags(choice.tags, choice.weight);
      } else if (question.id === "roaming") {
        applyTieBreaker(choice.mode);
      } else {
        state.answers[question.id] = choice.value || choice.mode || choice.text;
        scoreByValue(choice.field, choice.value, choice.weight);
      }

      state.currentIndex += 1;
      renderQuestion();
    }

    function getRankedSpecies() {
      return Object.entries(state.scores)
        .map(([name, score]) => ({ name, score, info: getSpecies(name) }))
        .filter(item => item.score > -900)
        .sort((a, b) => b.score - a.score);
    }

    function showResults() {
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.remove("hidden");

      const ranked = getRankedSpecies().slice(0, 3);
      const resultList = document.getElementById("result-list");
      resultList.innerHTML = "";

      if (ranked.length === 0) {
        resultList.innerHTML = "<p>결과를 만들 수 없었어.</p>";
        return;
      }

      ranked.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <h3>${index + 1}등. ${item.name}</h3>
          <p><strong>점수:</strong> ${item.score}</p>
          <p>${item.info.note}</p>
          <div class="small">
            <span class="tag">식성: ${translateDiet(item.info.diet)}</span>
            <span class="tag">크기: ${translateSize(item.info.size)}</span>
            <span class="tag">서식지: ${translateHabitat(item.info.habitat)}</span>
          </div>
        `;
        resultList.appendChild(div);
      });
    }

    function translateDiet(value) {
      return value === "carnivore" ? "육식" : value === "herbivore" ? "초식" : "잡식";
    }

    function translateSize(value) {
      return value === "apex" ? "초대형" : value === "large" ? "대형" : value === "mid" ? "중형" : "소형";
    }

    function translateHabitat(values) {
      const arr = Array.isArray(values) ? values : [values];
      return arr.map(v => {
        if (v === "land") return "육지";
        if (v === "water") return "물가/강";
        if (v === "global") return "맵 전역";
        return v;
      }).join(", ");
    }

    function startQuiz() {
      state.currentIndex = 0;
      state.answers = {};
      resetScores();
      document.getElementById("start-screen").classList.add("hidden");
      document.getElementById("result-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      renderQuestion();
    }

    document.getElementById("start-btn").onclick = startQuiz;
    document.getElementById("restart-btn").onclick = () => {
      document.getElementById("start-screen").classList.remove("hidden");
      document.getElementById("result-screen").classList.add("hidden");
    };

    resetScores();
  </script>
</body>
</html>
